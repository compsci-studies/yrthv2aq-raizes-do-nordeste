<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Raízes do Nordeste</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#inicio" data-screen="home" aria-label="Raízes do Nordeste">
        <span class="brand-mark">RN</span>
        <span>
          <strong>Raízes do Nordeste</strong>
          <small>Comida regional feita no capricho</small>
        </span>
      </a>

      <nav class="main-nav" aria-label="Navegação principal">
        <button class="nav-link is-active" type="button" data-screen="home">Início</button>
        <button class="nav-link" type="button" data-screen="menu">Cardápio</button>
        <button class="nav-link" type="button" data-screen="signup">Conta</button>
        <button class="nav-link" type="button" data-screen="privacy">Privacidade</button>
      </nav>

      <button class="cart-chip" type="button" data-screen="cart" aria-label="Abrir carrinho">
        <span>Carrinho</span>
        <strong id="cartCount">2</strong>
      </button>
    </header>

    <main id="app" class="app-shell" tabindex="-1"></main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./script.js"></script>
  </body>
</html>
